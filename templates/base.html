<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}GESTOR DE TAREAS{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color: #F8BBD0;">

    {% block contenido %}

    <div class="row justify-content-center mt-5 pt-5">
        <div class="col-md-6">
        
            <div class="card p-4 shadow-sm" style="background-color: #F5E6E8; border-radius:15px;">
                <h3 class="text-center mb-3" style="color:#5A5A5A;">
                    ¡BIENVENIDOS AL GESTOR DE TAREAS!
                </h3>

                <form>
                     <img src="static/1.jpg" class="rounded img-fluid mx-auto d-block mb-4" alt="" width="420" height="300">
                    <a href="/login" class="btn w-100 mb-3"
                       style="background-color:#C8A2AA; color:white; border-radius:10px;">
                        INICIAR SESIÓN
                    </a>

                    <a href="/registro" class="btn w-100"
                       style="border:1px solid #C8A2AA; color:#C8A2AA; border-radius:10px;">
                        REGISTRARSE
                    </a>
                </form>
            </div>

        </div>
    </div>

    {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
